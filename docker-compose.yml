# ═══════════════════════════════════════════════════════════════════════════════
# TravelSphere — Docker Compose
# ═══════════════════════════════════════════════════════════════════════════════
#
# Starts the full TravelSphere stack (backend + frontend) with a single command:
#   docker compose up --build
#
# Both services are placed on the shared 'travelsphere-net' bridge network.
# NGINX in the frontend container proxies /api/* → travelsphere-backend:8080
# using Docker's internal DNS — no hard-coded IPs needed.
#
# Environment variables:
#   Copy .env.example → .env and fill in your MongoDB Atlas connection string.
#   docker compose will automatically load variables from a .env file.
# ═══════════════════════════════════════════════════════════════════════════════

services:

  # ─── Backend: Spring Boot API ────────────────────────────────────────────────
  backend:
    container_name: travelsphere-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      # MongoDB Atlas connection string.
      # Replace the placeholder with your real URI, or set it in a .env file:
      #   SPRING_DATA_MONGODB_URI=mongodb+srv://user:pass@cluster/db
      # Spring Boot maps this env var → spring.data.mongodb.uri automatically.
      - SPRING_DATA_MONGODB_URI=${SPRING_DATA_MONGODB_URI:-mongodb+srv://<USERNAME>:<PASSWORD>@<CLUSTER>.mongodb.net/travelsphere?appName=TravelSphere-Cluster}
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - travelsphere-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/auth/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── Frontend: React + NGINX ─────────────────────────────────────────────────
  frontend:
    container_name: travelsphere-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      # Maps container port 80 (NGINX) → host port 5173
      # Matches the Vite dev server port so existing workflows aren't disrupted.
      - "5173:80"
    depends_on:
      - backend
    networks:
      - travelsphere-net
    restart: unless-stopped

  # ─── Jenkins CI/CD ───────────────────────────────────────────────────────────
  jenkins:
    build:
      context: ./jenkins
      dockerfile: Dockerfile
    container_name: jenkins-server
    ports:
      - "9090:8080" # Maps container 8080 to host 9090
      - "50000:50000"
    volumes:
      - jenkins_data:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock # Allows Jenkins to run Docker commands
    networks:
      - travelsphere-net
    restart: unless-stopped

# ─── Shared network ───────────────────────────────────────────────────────────
# Both services join this bridge network. Docker's internal DNS resolver
# allows NGINX to reach the backend via the hostname 'travelsphere-backend'
# (matching the container_name above).
networks:
  travelsphere-net:
    driver: bridge

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  jenkins_data:
