# =============================================================================
#  TravelSphere Backend – Application Properties
#  Spring Boot 3.x | Java 17 | MongoDB
# =============================================================================

# ─── Server ───────────────────────────────────────────────────────────────────
server.port=8080

# ─── Application name ─────────────────────────────────────────────────────────
spring.application.name=travelsphere-backend

# ─── MongoDB ──────────────────────────────────────────────────────────────────
# Replace <YOUR_PASSWORD> with your actual Atlas / local password.
# Replace <YOUR_CLUSTER> with your Atlas cluster hostname, or use
#   mongodb://localhost:27017/travelsphere  for a local instance.
#
# Atlas format:
#   mongodb+srv://<USERNAME>:<YOUR_PASSWORD>@<YOUR_CLUSTER>.mongodb.net/travelsphere?retryWrites=true&w=majority
#
spring.data.mongodb.uri=mongodb+srv://travel_admin:m1twrdTUtRo0ssdv@travelsphere-cluster.uaef0bw.mongodb.net/travelsphere?appName=TravelSphere-Cluster
spring.data.mongodb.database=travelsphere

# ─── Jackson (JSON serialisation) ─────────────────────────────────────────────
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false

# ─── Error responses ──────────────────────────────────────────────────────────
server.error.include-message=always
server.error.include-binding-errors=always

# ─── JWT ──────────────────────────────────────────────────────────────────────
# IMPORTANT: replace with a strong Base64-encoded secret in production.
# Minimum 256 bits (32 bytes) for HMAC-SHA256.
# Generate one with:  openssl rand -base64 32
app.jwt.secret=dGhpcy1pcy1hLXZlcnktc2VjdXJlLWtleS10aGF0LWlzLWxvbmctZW5vdWdoLWZvci1ITUFDLVNIQTI1Ng==
# Token lifetime: 24 hours in milliseconds
app.jwt.expiration-ms=86400000

# ─── Logging ──────────────────────────────────────────────────────────────────
logging.level.com.travelsphere=DEBUG
logging.level.org.springframework.security=INFO
logging.level.org.springframework.data.mongodb=INFO
