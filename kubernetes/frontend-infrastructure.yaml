apiVersion: apps/v1
kind: Deployment
metadata:
  name: travelsphere-frontend
  labels:
    app: travelsphere-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: travelsphere-frontend
  template:
    metadata:
      labels:
        app: travelsphere-frontend
    spec:
      containers:
        - name: travelsphere-frontend
          image: travelsphere-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  labels:
    app: travelsphere-frontend
spec:
  type: NodePort
  selector:
    app: travelsphere-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
      protocol: TCP
