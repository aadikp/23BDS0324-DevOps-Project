server {
    listen 80;
    server_name _;

    # ── Root: serve the Vite production build ────────────────────────────────
    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip on;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        image/svg+xml;
    gzip_min_length 1024;

    # ── API reverse-proxy → Spring Boot backend ───────────────────────────────
    # Using a variable for proxy_pass defers DNS resolution to request time
    # instead of NGINX startup. This prevents the container from crashing when
    # the backend isn't on the same Docker network yet.
    # 127.0.0.11 = Docker's internal DNS resolver (works in any Docker network).
    #
    # IMPORTANT: proxy_pass uses $backend (no URI path). When a variable is
    # used, nginx does NOT perform location-prefix substitution. Removing the
    # explicit path means nginx passes the full original request URI unchanged:
    #   /api/auth/register → http://travelsphere-backend:8080/api/auth/register
    location /api/ {
        proxy_pass         http://backend-service:8080;
        proxy_http_version 1.1;

        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout    60s;
        proxy_connect_timeout 10s;
    }

    # ── React SPA fallback ────────────────────────────────────────────────────
    # All non-asset routes (e.g. /planner, /admin) are handled by React Router.
    # Serve index.html for every unknown path so the client-side router works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Static asset caching ──────────────────────────────────────────────────
    # Vite fingerprints JS/CSS assets, so they can be cached aggressively.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options         "SAMEORIGIN"   always;
    add_header X-Content-Type-Options  "nosniff"      always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
}
